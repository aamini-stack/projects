name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  AWS_REGION: us-east-1
  ECR_REGISTRY: 302481198387.dkr.ecr.us-east-1.amazonaws.com

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run format typecheck lint test:unit

  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:integration

  publish-app-images:
    if:
      ${{ github.event_name == 'push' ||
      !github.event.pull_request.head.repo.fork }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - dota-visualizer
          - imdbgraph
          - pc-tune-ups
          - portfolio
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Compute image tag
        id: image_tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "value=pr-${PR_NUMBER}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "value=main-${SHA}" >> "$GITHUB_OUTPUT"
      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          build-args: APP_NAME=${{ matrix.app }}
          tags:
            ${{ env.ECR_REGISTRY }}/${{ matrix.app }}:${{ steps.image_tag.outputs.value }}
            ${{ env.ECR_REGISTRY }}/${{ matrix.app }}:latest
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  publish-gitops:
    needs:
      - publish-app-images
    if:
      ${{ github.event_name == 'push' ||
      !github.event.pull_request.head.repo.fork }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: azure/setup-helm@v4
      - uses: oras-project/setup-oras@v1
      - name: Render GitOps bundle
        run:
          pnpm node --experimental-strip-types scripts/src/publish-gitops.ts
          render --deploy-revision ${{ github.sha }}
      - name: Push app-release chart
        run: |
          mkdir -p .tmp/chart
          helm package packages/infra/charts/app-release --destination .tmp/chart
          helm push .tmp/chart/app-release-0.1.0.tgz oci://${{ env.ECR_REGISTRY }}
      - name: Push GitOps OCI bundle
        run: |
          tar -C .tmp/gitops-bundle -czf .tmp/projects-gitops.tar.gz .
          oras push ${{ env.ECR_REGISTRY }}/projects-gitops:latest \
            .tmp/projects-gitops.tar.gz:application/vnd.aamini.gitops.bundle.v1+tar.gz
      - name: Notify Flux receiver
        env:
          FLUX_RECEIVER_URL: ${{ secrets.FLUX_RECEIVER_URL }}
        run: |
          set -euo pipefail
          test -n "$FLUX_RECEIVER_URL"

          attempt=1
          max_attempts=6
          delay_seconds=10

          until curl --fail --show-error --silent \
            --connect-timeout 10 \
            --max-time 30 \
            --request POST \
            --header 'Content-Type: application/json' \
            --data '{"source":"github-actions","workflow":"ci","run_id":"${{ github.run_id }}","sha":"${{ github.sha }}"}' \
            "$FLUX_RECEIVER_URL"; do
            exit_code=$?
            if [[ "$attempt" -ge "$max_attempts" ]]; then
              echo "::warning::Flux receiver remained unavailable after ${max_attempts} attempts. OCI artifacts were published successfully; Flux must pick up the update via its normal polling interval."
              exit 0
            fi

            echo "Flux receiver request failed on attempt ${attempt}/${max_attempts}; retrying in ${delay_seconds}s"
            sleep "$delay_seconds"
            attempt=$((attempt + 1))
            delay_seconds=$((delay_seconds * 2))
          done

  wait-for-deploy-ready:
    needs:
      - publish-gitops
    if:
      ${{ github.event_name == 'pull_request' &&
      !github.event.pull_request.head.repo.fork }}
    runs-on: ubuntu-latest
    permissions:
      statuses: read
    steps:
      - name: Wait for deploy-ready e2e status
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          deadline=$((SECONDS + 1800))
          while (( SECONDS < deadline )); do
            state="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${SHA}/status" --jq '.statuses | map(select(.context == "e2e/all-required")) | if length == 0 then "missing" else .[0].state end')"

            case "$state" in
              success)
                echo "Deployment e2e completed successfully."
                exit 0
                ;;
              failure|error)
                echo "Deployment e2e failed."
                exit 1
                ;;
              pending|missing)
                echo "Current deploy-ready aggregate status: ${state}. Waiting for Flux deploy and e2e results."
                sleep 30
                ;;
              *)
                echo "Unexpected deploy-ready aggregate status: ${state}"
                sleep 30
                ;;
            esac
          done

          echo "Timed out waiting for deploy-ready e2e status."
          exit 1
