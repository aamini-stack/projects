name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed apps
        id: changed_apps
        shell: bash
        run: |
          BASE_REF="${{ github.event.pull_request.base.sha || github.event.before }}"
          HEAD_REF="${{ github.event.pull_request.head.sha || github.sha }}"
          CHANGED_APPS="$(git diff --name-only "$BASE_REF" "$HEAD_REF" | awk -F/ '/^apps\// {print $2}' | sort -u | paste -sd, -)"
          echo "changed_apps_csv=$CHANGED_APPS" >> "$GITHUB_OUTPUT"

      - uses: dagger/dagger-for-github@v8.0.0
        with:
          version: "0.20.1"
          verb: call
          args: >-
            ci
            --event=${{ github.event_name }}
            --sha=${{ github.sha }}
            --ghcr-token=env:GHCR_TOKEN
            --changed-apps-csv=${{ steps.changed_apps.outputs.changed_apps_csv }}
            --base-ref=${{ github.event.pull_request.base.sha || github.event.before }}
            --head-ref=${{ github.event.pull_request.head.sha || github.sha }}
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
