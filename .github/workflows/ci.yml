name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  AWS_REGION: us-east-1
  ECR_REGISTRY: 302481198387.dkr.ecr.us-east-1.amazonaws.com

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run format typecheck lint

  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:integration

  deploy-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      deployments: write
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        app:
          - dota-visualizer
          - imdbgraph
          - pc-tune-ups
          - portfolio
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Compute deploy outputs
        id: deploy
        run: |
          ./scripts/bin/aamini ci deploy outputs \
            --repository "${GITHUB_REPOSITORY}" \
            --event-name "${GITHUB_EVENT_NAME}" \
            --event-path "${GITHUB_EVENT_PATH}" \
            --app "${{ matrix.app }}" \
            --sha "${{ github.sha }}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: No-op summary
        if: steps.deploy.outputs.changed != 'true'
        run: |
          if [[ "${{ steps.deploy.outputs.reason }}" == "fork-pr" ]]; then
            echo "Deploy skipped: fork PR has no deploy secrets"
          elif [[ "${{ steps.deploy.outputs.reason }}" == "unsupported-event" ]]; then
            echo "Deploy skipped: event '${{ github.event_name }}' is not a deploy trigger"
          else
            echo "No changed apps for ${{ matrix.app }}; skipping build/push/deploy"
          fi

      - uses: aws-actions/configure-aws-credentials@v5
        if: steps.deploy.outputs.changed == 'true'
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        if: steps.deploy.outputs.changed == 'true'
      - uses: azure/setup-helm@v4
        if: steps.deploy.outputs.changed == 'true'
      - uses: oras-project/setup-oras@v1
        if: steps.deploy.outputs.changed == 'true'

      - name: Build image
        if: steps.deploy.outputs.changed == 'true'
        env:
          IMAGE_TAG: ${{ steps.deploy.outputs.image_tag }}
        run: ./scripts/bin/aamini docker build ${{ matrix.app }}

      - name: Push image
        if: steps.deploy.outputs.changed == 'true'
        env:
          IMAGE_TAG: ${{ steps.deploy.outputs.image_tag }}
        run: ./scripts/bin/aamini docker push ${{ matrix.app }}

      - name: Deploy GitOps manifests
        if: steps.deploy.outputs.changed == 'true'
        env:
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          FLUX_RECEIVER_URL: ${{ secrets.FLUX_RECEIVER_URL }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ./scripts/bin/aamini deploy gitops \
              --app "${{ matrix.app }}" \
              --preview \
              --pr-number "${{ github.event.pull_request.number }}" \
              --sha "${{ github.sha }}"
          else
            ./scripts/bin/aamini deploy gitops \
              --app "${{ matrix.app }}" \
              --production \
              --sha "${{ github.sha }}"
          fi
