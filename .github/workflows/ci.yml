name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run format typecheck lint test:unit

  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:integration

  deploy-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        app:
          - dota-visualizer
          - imdbgraph
          - pc-tune-ups
          - portfolio
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Compute deploy outputs
        id: deploy
        run: |
          ./scripts/bin/aamini ci deploy outputs \
            --repository "${GITHUB_REPOSITORY}" \
            --event-name "${GITHUB_EVENT_NAME}" \
            --event-path "${GITHUB_EVENT_PATH}" \
            --app "${{ matrix.app }}" \
            --sha "${{ github.sha }}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: No-op summary
        if: steps.deploy.outputs.changed != 'true'
        run: |
          if [[ "${{ steps.deploy.outputs.reason }}" == "fork-pr" ]]; then
            echo "Deploy skipped: fork PR has no deploy secrets"
          elif [[ "${{ steps.deploy.outputs.reason }}" == "unsupported-event" ]]; then
            echo "Deploy skipped: event '${{ github.event_name }}' is not a deploy trigger"
          else
            echo "No changed apps for ${{ matrix.app }}; skipping build/push/deploy"
          fi

      - uses: azure/login@v2
        if: steps.deploy.outputs.changed == 'true'
        with:
          client-id: cf8a46ce-be98-4f8c-acbc-618771c1caba
          tenant-id: 1eb98549-3952-4fc7-b783-da109d29a89a
          subscription-id: 331269d5-143f-4246-b389-9c1f41bb5882
      - name: Login to ACR
        if: steps.deploy.outputs.changed == 'true'
        run: az acr login --name aaministack

      - name: Build image
        if: steps.deploy.outputs.changed == 'true'
        env:
          ECR_REGISTRY: aaministack.azurecr.io
          IMAGE_TAG: ${{ steps.deploy.outputs.image_tag }}
        run: ./scripts/bin/aamini docker build ${{ matrix.app }}

      - name: Push image
        if: steps.deploy.outputs.changed == 'true'
        env:
          ECR_REGISTRY: aaministack.azurecr.io
          IMAGE_TAG: ${{ steps.deploy.outputs.image_tag }}
        run: ./scripts/bin/aamini docker push ${{ matrix.app }}
