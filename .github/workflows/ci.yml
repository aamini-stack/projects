name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  AWS_REGION: us-east-1
  ECR_REGISTRY: 302481198387.dkr.ecr.us-east-1.amazonaws.com

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run format typecheck lint test:unit

  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:integration

  # Build, deploy, and run e2e tests
  build-deploy-e2e:
    if: >
      ${{
        github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      deployments: write
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        app:
          - dota-visualizer
          - imdbgraph
          - pc-tune-ups
          - portfolio
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: azure/setup-helm@v4
      - uses: oras-project/setup-oras@v1

      - name: Compute image tag
        id: image-tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "value=pr-${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          else
            echo "value=main-${SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if app changed
        id: changed
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA:
            ${{ github.event.pull_request.base.sha || github.event.before }}
          APP: ${{ matrix.app }}
        run: |
          # On push to main, always deploy
          if [[ "$EVENT_NAME" == "push" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # On PR, check if app changed
          if git diff --name-only "$BASE_SHA" HEAD | grep -q "^apps/$APP/"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        if: steps.changed.outputs.changed == 'true'
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.value }}
        run: ./scripts/bin/aamini docker build ${{ matrix.app }}

      - name: Push image
        if: steps.changed.outputs.changed == 'true'
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.value }}
        run: ./scripts/bin/aamini docker push ${{ matrix.app }}

      - name: Deploy GitOps manifests
        if: matrix.app == 'portfolio' && steps.changed.outputs.changed == 'true'
        env:
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          FLUX_RECEIVER_URL: ${{ secrets.FLUX_RECEIVER_URL }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ./scripts/bin/aamini deploy gitops \
              --preview \
              --pr-number "${{ github.event.pull_request.number }}" \
              --sha "${{ github.sha }}"
          else
            ./scripts/bin/aamini deploy gitops \
              --production \
              --sha "${{ github.sha }}"
          fi

      - name: Run e2e tests
        if: steps.changed.outputs.changed == 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ./scripts/bin/aamini e2e run ${{ matrix.app }} \
              --preview "$PR_NUMBER" \
              --wait
          else
            ./scripts/bin/aamini e2e run ${{ matrix.app }} \
              --production \
              --wait
          fi

      - name: Upload Playwright report
        if: always() && steps.changed.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.app }}
          path: apps/${{ matrix.app }}/playwright-report
          retention-days: 7
