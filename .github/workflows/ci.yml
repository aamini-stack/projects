name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  AWS_REGION: us-east-1
  ECR_REGISTRY: 302481198387.dkr.ecr.us-east-1.amazonaws.com

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run format typecheck lint test:unit

  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:integration

  publish-app-images:
    if:
      ${{ github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Compute image tag
        id: image_tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "value=pr-${PR_NUMBER}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "value=main-${SHA}" >> "$GITHUB_OUTPUT"
      - name: Build all app images via Turbo
        env:
          IMAGE_TAG: ${{ steps.image_tag.outputs.value }}
        run: pnpm docker:build
      - name: Push all app images via Turbo
        env:
          IMAGE_TAG: ${{ steps.image_tag.outputs.value }}
        run: pnpm docker:push

  publish-gitops:
    needs:
      - publish-app-images
    if:
      ${{ github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      deployments: write
      pull-requests: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: azure/setup-helm@v4
      - uses: oras-project/setup-oras@v1
      - name: Render GitOps bundle
        run:
          pnpm node --experimental-strip-types scripts/src/publish-gitops.ts
          render --deploy-revision ${{ github.sha }}
      - name: Push app-release chart
        run: |
          mkdir -p .tmp/chart
          helm package packages/infra/charts/app-release --destination .tmp/chart
          helm push .tmp/chart/app-release-0.1.0.tgz oci://${{ env.ECR_REGISTRY }}
      - name: Push GitOps OCI bundle
        run: |
          tar -C .tmp/gitops-bundle -czf .tmp/projects-gitops.tar.gz .
          oras push ${{ env.ECR_REGISTRY }}/projects-gitops:latest \
            .tmp/projects-gitops.tar.gz:application/vnd.aamini.gitops.bundle.v1+tar.gz
      - name: Notify Flux receiver
        env:
          FLUX_RECEIVER_URL: ${{ secrets.FLUX_RECEIVER_URL }}
        run: |
          set -euo pipefail
          test -n "$FLUX_RECEIVER_URL"

          redacted_url="${FLUX_RECEIVER_URL%%\?*}"
          if [[ "$redacted_url" != *"/hook/"* ]]; then
            echo "::warning::FLUX_RECEIVER_URL does not include '/hook/' path. Current value may be incorrect."
          fi

          attempt=1
          max_attempts=6
          delay_seconds=10

          while true; do
            response_code="$(curl --show-error --silent \
              --output /dev/null \
              --write-out '%{http_code}' \
              --connect-timeout 10 \
              --max-time 30 \
              --request POST \
              --header 'Content-Type: application/json' \
              --data '{"source":"github-actions","workflow":"ci","run_id":"${{ github.run_id }}","sha":"${{ github.sha }}"}' \
              "$FLUX_RECEIVER_URL" || true)"

            if [[ "$response_code" =~ ^2[0-9]{2}$ ]]; then
              echo "Flux receiver acknowledged webhook (HTTP ${response_code})."
              break
            fi

            if [[ "$response_code" == "404" ]]; then
              echo "::warning::Flux receiver returned 404. Check FLUX_RECEIVER_URL path/token in Actions secrets. Skipping webhook retries; relying on Flux polling."
              break
            fi

            if [[ "$attempt" -ge "$max_attempts" ]]; then
              echo "::warning::Flux receiver remained unavailable after ${max_attempts} attempts (last HTTP ${response_code}). OCI artifacts were published successfully; Flux must pick up the update via its normal polling interval."
              break
            fi

            echo "Flux receiver request failed on attempt ${attempt}/${max_attempts} (HTTP ${response_code}); retrying in ${delay_seconds}s"
            sleep "$delay_seconds"
            attempt=$((attempt + 1))
            delay_seconds=$((delay_seconds * 2))
          done
      - name: Create preview deployments for required apps
        if:
          ${{ github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA: ${{ github.sha }}
          WORKFLOW_REF:
            ${{ github.event.pull_request.head.ref || github.ref_name }}
          RUN_URL:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{
            github.run_id }}
        run: |
          pnpm node --experimental-strip-types scripts/src/actions/preview-deployments.ts \
            --repository "${GITHUB_REPOSITORY}" \
            --sha "${SHA}" \
            --pr-number "${PR_NUMBER}" \
            --workflow-ref "${WORKFLOW_REF}" \
            --run-url "${RUN_URL}"
