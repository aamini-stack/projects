name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run format typecheck lint test:unit

  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:integration

  publish-gitops:
    needs:
      - quality-checks
      - integration-tests
    if:
      ${{ github.event_name == 'push' ||
      !github.event.pull_request.head.repo.fork }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - uses: azure/setup-helm@v4
      - uses: oras-project/setup-oras@v1
      - name: Authenticate OCI clients
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_PASSWORD: ${{ secrets.GHCR_TOKEN }}
        run: |
          printf '%s' "$GHCR_PASSWORD" | helm registry login ghcr.io --username "$GHCR_USERNAME" --password-stdin
          printf '%s' "$GHCR_PASSWORD" | oras login ghcr.io --username "$GHCR_USERNAME" --password-stdin
      - name: Render GitOps bundle
        run:
          pnpm node --experimental-strip-types scripts/src/publish-gitops.ts
          render --deploy-revision ${{ github.sha }}
      - name: Push app-release chart
        run: |
          mkdir -p .tmp/chart
          helm package packages/infra/charts/app-release --destination .tmp/chart
          helm push .tmp/chart/app-release-0.1.0.tgz oci://ghcr.io/aamini-stack
      - name: Push GitOps OCI bundle
        run: |
          tar -C .tmp/gitops-bundle -czf .tmp/projects-gitops.tar.gz .
          oras push ghcr.io/aamini-stack/projects-gitops:latest \
            .tmp/projects-gitops.tar.gz:application/vnd.aamini.gitops.bundle.v1+tar.gz
      - name: Notify Flux receiver
        env:
          FLUX_RECEIVER_URL: ${{ secrets.FLUX_RECEIVER_URL }}
        run: |
          test -n "$FLUX_RECEIVER_URL"
          curl --fail --show-error --silent \
            --request POST \
            --header 'Content-Type: application/json' \
            --data '{"source":"github-actions","workflow":"ci","run_id":"${{ github.run_id }}","sha":"${{ github.sha }}"}' \
            "$FLUX_RECEIVER_URL"
