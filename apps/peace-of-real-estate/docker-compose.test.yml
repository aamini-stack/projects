services:
  postgres:
    image: postgres:17-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: peace_of_real_estate_test
      POSTGRES_USER: peace_user
      POSTGRES_PASSWORD: peace_test
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U peace_user -d peace_of_real_estate_test']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - peace-test-postgres:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - peace-test-minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: /bin/sh
    command:
      - -lc
      - >
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
        sleep 1; done && mc mb --ignore-existing local/peace-of-real-estate-test
        && mc anonymous set download local/peace-of-real-estate-test

volumes:
  peace-test-postgres:
  peace-test-minio:
