[build]
builder = "RAILPACK"
buildCommand = "pnpm --filter pawpaws-dog-grooming build"
watchPatterns = [
	"/apps/pawpaws-dog-grooming/**",
	"/packages/**",
	"package.json",
	"pnpm-lock.yaml",
]

[deploy]
multiRegionConfig = { "us-west2" = { numReplicas = 1 } }
runtime = "V2"
numReplicas = 1
startCommand = "cd apps/pawpaws-dog-grooming && node .output/server/index.mjs"
healthcheckPath = "/"
sleepApplication = true
ipv6EgressEnabled = false
restartPolicyType = "ALWAYS"
healthcheckTimeout = 300
