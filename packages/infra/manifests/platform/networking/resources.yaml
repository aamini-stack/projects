apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token
  namespace: networking
type: Opaque
stringData:
  api-token: ${CLOUDFLARE_API_TOKEN}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ariaamini-com-wildcard
  namespace: networking
spec:
  secretName: ariaamini-com-tls
  dnsNames:
    - '*.ariaamini.com'
    - ariaamini.com
  privateKey:
    rotationPolicy: Always
  issuerRef:
    name: letsencrypt
    kind: Issuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: letsencrypt
  namespace: networking
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: acme-issuer-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: traefik
  namespace: networking
spec:
  controllerName: traefik.io/gateway-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: traefik-gateway
  namespace: networking
spec:
  gatewayClassName: traefik
  listeners:
    - name: web
      port: 8000
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: websecure
      port: 8443
      protocol: HTTPS
      hostname: '*.ariaamini.com'
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: ariaamini-com-tls
            namespace: networking
      allowedRoutes:
        namespaces:
          from: All
    - name: websecure-root
      port: 8443
      protocol: HTTPS
      hostname: ariaamini.com
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: ariaamini-com-tls
            namespace: networking
      allowedRoutes:
        namespaces:
          from: All
