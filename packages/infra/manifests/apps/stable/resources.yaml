apiVersion: v1
kind: Namespace
metadata:
  name: imdbgraph
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: imdbgraph-secrets
  namespace: imdbgraph
spec:
  encryptedData:
    CRON_SECRET: 
    DATABASE_URL: 
  template:
    metadata:
      name: imdbgraph-secrets
      namespace: imdbgraph
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: imdbgraph
  namespace: imdbgraph
spec:
  interval: 10m
  chart:
    spec:
      chart: ./packages/infra/charts/app-release
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 10m
  values:
    app:
      name: imdbgraph
      namespace: imdbgraph
    image:
      repository: aaministack.azurecr.io/imdbgraph
      tag: latest
    host: imdbgraph.ariaamini.com
    envFromSecret: imdbgraph-secrets
---
apiVersion: v1
kind: Namespace
metadata:
  name: portfolio
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: portfolio-secrets
  namespace: portfolio
spec:
  encryptedData:
    MAILGUN_API_KEY: 
    MAILGUN_DOMAIN: 
  template:
    metadata:
      name: portfolio-secrets
      namespace: portfolio
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: portfolio
  namespace: portfolio
spec:
  interval: 10m
  chart:
    spec:
      chart: ./packages/infra/charts/app-release
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 10m
  values:
    app:
      name: portfolio
      namespace: portfolio
    image:
      repository: aaministack.azurecr.io/portfolio
      tag: latest
    host: portfolio.ariaamini.com
    envFromSecret: portfolio-secrets
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: portfolio-root-http
  namespace: portfolio
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: networking
      sectionName: web
  hostnames:
    - ariaamini.com
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: portfolio-root-https
  namespace: portfolio
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: networking
      sectionName: websecure-root
  hostnames:
    - ariaamini.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: portfolio-service
          port: 80
---
