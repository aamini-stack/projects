apiVersion: v1
kind: Namespace
metadata:
  name: imdbgraph
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: imdbgraph-secrets
  namespace: imdbgraph
spec:
  encryptedData:
    CRON_SECRET: 
    DATABASE_URL: 
  template:
    metadata:
      name: imdbgraph-secrets
      namespace: imdbgraph
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: imdbgraph
  namespace: imdbgraph
spec:
  interval: 10m
  chart:
    spec:
      chart: ./packages/infra/charts/app-release
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 10m
  values:
    app:
      name: imdbgraph
      namespace: imdbgraph
    image:
      repository: aaministack.azurecr.io/imdbgraph
      tag: latest
    host: imdbgraph.ariaamini.com
    envFromSecret: imdbgraph-secrets
